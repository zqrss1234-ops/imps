name: Build Master

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build normal
        run: |
          xcrun -sdk iphoneos clang++ \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -fobjc-weak \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -dynamiclib \
            -o YallaMaster.dylib \
            -x objective-c++ \
            Master/Tweak.xm 2>build_error.txt; echo $? > build_status.txt

      - name: Build DIRECT (no passcode)
        run: |
          xcrun -sdk iphoneos clang++ \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -fobjc-weak \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -dynamiclib \
            -DYM_DIRECT \
            -o YallaMaster_DIRECT.dylib \
            -x objective-c++ \
            Master/Tweak.xm 2>build_direct_error.txt; echo $? > build_direct_status.txt

      - name: Upload build logs even if failed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_error.txt
            build_direct_error.txt
            build_status.txt
            build_direct_status.txt
          if-no-files-found: warn

      - name: Sign dylibs
        if: always()
        run: |
          curl -sL -o /tmp/ldid https://github.com/opa334/ldid/releases/download/v2.1.2-procursus5/ldid_macosx_arm64
          chmod +x /tmp/ldid
          for f in YallaMaster.dylib YallaMaster_DIRECT.dylib; do
            if [ -f "$f" ]; then
              /tmp/ldid -Sentitlements.plist "$f"
              mkdir -p output
              cp "$f" output/
            fi
          done

      - name: Upload dylibs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YallaMaster-dylibs
          path: output/
          if-no-files-found: warn


