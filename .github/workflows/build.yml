name: Build Master

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build normal
        run: |
          SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          echo "SDK path: $SDK"
          xcrun -sdk iphoneos clang++ \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -fobjc-weak \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -dynamiclib \
            -o YallaMaster.dylib \
            -x objective-c++ \
            Master/Tweak.xm

      - name: Build DIRECT (no passcode)
        run: |
          xcrun -sdk iphoneos clang++ \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -fobjc-weak \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -dynamiclib \
            -DYM_DIRECT \
            -o YallaMaster_DIRECT.dylib \
            -x objective-c++ \
            Master/Tweak.xm

      - name: Sign
        run: |
          curl -sL -o /tmp/ldid https://github.com/opa334/ldid/releases/download/v2.1.2-procursus5/ldid_macosx_arm64
          chmod +x /tmp/ldid
          /tmp/ldid -Sentitlements.plist YallaMaster.dylib
          /tmp/ldid -Sentitlements.plist YallaMaster_DIRECT.dylib

      - name: Upload dylibs
        uses: actions/upload-artifact@v4
        with:
          name: YallaMaster-dylibs
          path: |
            YallaMaster.dylib
            YallaMaster_DIRECT.dylib
