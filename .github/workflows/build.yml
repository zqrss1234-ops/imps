name: Build YallaAgent

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build normal
        run: |
          xcrun -sdk iphoneos clang++ \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -fobjc-weak \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -dynamiclib \
            -o YallaAgent.dylib \
            -x objective-c++ \
            Agent/Tweak.xm 2>build_error.txt; echo $? > build_status.txt

      - name: Build DIRECT (no passcode)
        run: |
          xcrun -sdk iphoneos clang++ \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -fobjc-weak \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -dynamiclib \
            -DYM_DIRECT \
            -o YallaAgent_DIRECT.dylib \
            -x objective-c++ \
            Agent/Tweak.xm 2>build_direct_error.txt; echo $? > build_direct_status.txt

      - name: Upload build logs even if failed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_error.txt
            build_direct_error.txt
            build_status.txt
            build_direct_status.txt
          if-no-files-found: warn

      - name: Sign and stage dylibs
        if: always()
        run: |
          curl -sL -o /tmp/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_macosx_arm64
          chmod +x /tmp/ldid
          mkdir -p output_agent
          for f in YallaAgent.dylib YallaAgent_DIRECT.dylib; do
            if [ -f "$f" ]; then
              /tmp/ldid -Sentitlements.plist "$f" || echo "Signing $f failed, uploading unsigned"
              cp "$f" output_agent/
            fi
          done
          cp Agent/YallaAgent.plist output_agent/

      - name: Upload dylibs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YallaAgent-dylibs
          path: output_agent/
          if-no-files-found: warn
